<div class="sh-page">
  <sh-page-header title="Posiciones" subtitle="Gestión de requisiciones y posiciones abiertas">
    <button mat-flat-button color="primary" routerLink="/positions/new">
      <mat-icon>add</mat-icon> Nueva posición
    </button>
  </sh-page-header>

  <form [formGroup]="searchForm" class="sh-filters sh-card">
    <mat-form-field appearance="outline" class="filter-search">
      <mat-label>Buscar posición</mat-label>
      <mat-icon matPrefix>search</mat-icon>
      <input matInput formControlName="search" placeholder="Cliente, puesto, OT, clave…" />
    </mat-form-field>
  </form>

  @if (loading) {
    <div class="loading-wrap"><mat-spinner diameter="36" /></div>
  } @else {
    <div class="sh-card sh-table-wrap">
      <table mat-table [dataSource]="data">
        <ng-container matColumnDef="requisitionNo">
          <th mat-header-cell *matHeaderCellDef>Requisición</th>
          <td mat-cell *matCellDef="let row"><span class="mono-id">{{ row.requisitionNo }}</span></td>
        </ng-container>
        <ng-container matColumnDef="name"><th mat-header-cell *matHeaderCellDef>Puesto</th><td mat-cell *matCellDef="let row">{{ row.name }}</td></ng-container>
        <ng-container matColumnDef="ot"><th mat-header-cell *matHeaderCellDef>OT</th><td mat-cell *matCellDef="let row">{{ row.ot || '—' }}</td></ng-container>
        <ng-container matColumnDef="client"><th mat-header-cell *matHeaderCellDef>Cliente</th><td mat-cell *matCellDef="let row">{{ row.client }}</td></ng-container>
        <ng-container matColumnDef="clientKey"><th mat-header-cell *matHeaderCellDef>Clave</th><td mat-cell *matCellDef="let row">{{ row.clientKey || '—' }}</td></ng-container>
        <ng-container matColumnDef="city"><th mat-header-cell *matHeaderCellDef>Ciudad</th><td mat-cell *matCellDef="let row">{{ row.city || '—' }}</td></ng-container>
        <ng-container matColumnDef="status"><th mat-header-cell *matHeaderCellDef>Estado</th><td mat-cell *matCellDef="let row"><sh-status-badge [status]="row.status" /></td></ng-container>
        <ng-container matColumnDef="createdAt"><th mat-header-cell *matHeaderCellDef>Creación</th><td mat-cell *matCellDef="let row">{{ row.createdAt | date:'dd/MM/yyyy' }}</td></ng-container>
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef></th>
          <td mat-cell *matCellDef="let row">
            <button mat-stroked-button [routerLink]="['/positions', row.id, 'edit']">Editar</button>
            <button mat-button [routerLink]="['/selection', row.id, 'ai']">Selección</button>
          </td>
        </ng-container>
        <tr mat-header-row *matHeaderRowDef="columns"></tr>
        <tr mat-row *matRowDef="let row; columns: columns"></tr>
      </table>
      <mat-paginator [length]="total" [pageSize]="pageSize" [pageIndex]="pageIndex" [pageSizeOptions]="[10, 25, 50]" (page)="onPage($event)" />
    </div>
  }
</div>
