<div class="sh-page">
  <sh-page-header title="Cuestionarios" subtitle="Evaluaciones y pruebas para candidatos">
    <button mat-flat-button color="primary" routerLink="/questionnaires/assign"><mat-icon>assignment</mat-icon> Asignar</button>
  </sh-page-header>

  @if (loading) {
    <div class="loading-wrap"><mat-spinner diameter="36" /></div>
  } @else {
    <div class="sh-card sh-table-wrap">
      <table mat-table [dataSource]="data">
        <ng-container matColumnDef="name"><th mat-header-cell *matHeaderCellDef>Nombre</th><td mat-cell *matCellDef="let row">{{ row.name }}</td></ng-container>
        <ng-container matColumnDef="category"><th mat-header-cell *matHeaderCellDef>Categoría</th><td mat-cell *matCellDef="let row">{{ row.category }}</td></ng-container>
        <ng-container matColumnDef="questionsCount"><th mat-header-cell *matHeaderCellDef>Preguntas</th><td mat-cell *matCellDef="let row">{{ row.questionsCount }}</td></ng-container>
        <ng-container matColumnDef="acceptancePercent"><th mat-header-cell *matHeaderCellDef>% Aprobación</th><td mat-cell *matCellDef="let row">{{ row.acceptancePercent }}%</td></ng-container>
        <ng-container matColumnDef="type"><th mat-header-cell *matHeaderCellDef>Tipo</th><td mat-cell *matCellDef="let row">{{ row.type }}</td></ng-container>
        <ng-container matColumnDef="active"><th mat-header-cell *matHeaderCellDef>Activo</th><td mat-cell *matCellDef="let row">{{ row.active ? 'Sí' : 'No' }}</td></ng-container>
        <ng-container matColumnDef="actions"><th mat-header-cell *matHeaderCellDef></th><td mat-cell *matCellDef="let row"><button mat-button routerLink="/questionnaires/assign">Asignar</button></td></ng-container>
        <tr mat-header-row *matHeaderRowDef="columns"></tr>
        <tr mat-row *matRowDef="let row; columns: columns"></tr>
      </table>
    </div>
  }
</div>
