<div class="settings-layout sh-page">
  <h2 i18n="@@nav.settings.title">Configuraciones</h2>
  <div class="layout-body">
    <aside class="sidebar">
      @for (item of navItems(); track item.path) {
        <a [routerLink]="['/settings', item.path]" routerLinkActive="active">{{ item.label }}</a>
      }
    </aside>
    <main class="content">
      <router-outlet />
    </main>
  </div>
</div>
