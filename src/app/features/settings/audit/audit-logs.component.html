<h3>Bitácoras de auditoría</h3>
@if (loading) {
  <div class="loading-wrap"><mat-spinner diameter="36" /></div>
} @else {
  <div class="sh-card sh-table-wrap">
    <table mat-table [dataSource]="data">
      <ng-container matColumnDef="timestamp"><th mat-header-cell *matHeaderCellDef>Fecha</th><td mat-cell *matCellDef="let row">{{ row.timestamp | date:'dd/MM/yyyy HH:mm' }}</td></ng-container>
      <ng-container matColumnDef="user"><th mat-header-cell *matHeaderCellDef>Usuario</th><td mat-cell *matCellDef="let row">{{ row.user }}</td></ng-container>
      <ng-container matColumnDef="action"><th mat-header-cell *matHeaderCellDef>Acción</th><td mat-cell *matCellDef="let row">{{ row.action }}</td></ng-container>
      <ng-container matColumnDef="entity"><th mat-header-cell *matHeaderCellDef>Entidad</th><td mat-cell *matCellDef="let row">{{ row.entity }}</td></ng-container>
      <ng-container matColumnDef="entityId"><th mat-header-cell *matHeaderCellDef>ID</th><td mat-cell *matCellDef="let row">{{ row.entityId }}</td></ng-container>
      <ng-container matColumnDef="details"><th mat-header-cell *matHeaderCellDef>Detalle</th><td mat-cell *matCellDef="let row">{{ row.details }}</td></ng-container>
      <tr mat-header-row *matHeaderRowDef="columns"></tr>
      <tr mat-row *matRowDef="let row; columns: columns"></tr>
    </table>
  </div>
}
