<h3>Notificaciones</h3>
@if (loading) {
  <div class="loading-wrap"><mat-spinner diameter="36" /></div>
} @else {
  <div class="sh-card sh-table-wrap">
    <table mat-table [dataSource]="data">
      <ng-container matColumnDef="action"><th mat-header-cell *matHeaderCellDef>Acción</th><td mat-cell *matCellDef="let row">{{ row.action }}</td></ng-container>
      <ng-container matColumnDef="channels"><th mat-header-cell *matHeaderCellDef>Canales</th><td mat-cell *matCellDef="let row">@for (ch of row.channels; track ch) { <mat-chip>{{ ch }}</mat-chip> }</td></ng-container>
      <ng-container matColumnDef="templateId"><th mat-header-cell *matHeaderCellDef>Plantilla</th><td mat-cell *matCellDef="let row"><code>{{ row.templateId }}</code></td></ng-container>
      <ng-container matColumnDef="message"><th mat-header-cell *matHeaderCellDef>Mensaje</th><td mat-cell *matCellDef="let row">{{ row.message }}</td></ng-container>
      <ng-container matColumnDef="active"><th mat-header-cell *matHeaderCellDef>Activo</th><td mat-cell *matCellDef="let row"><mat-slide-toggle [checked]="row.active" (change)="toggle(row)" /></td></ng-container>
      <tr mat-header-row *matHeaderRowDef="columns"></tr>
      <tr mat-row *matRowDef="let row; columns: columns"></tr>
    </table>
  </div>
}
