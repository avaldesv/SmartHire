<h3>Catálogos</h3>
@if (loading) {
  <div class="loading-wrap"><mat-spinner diameter="36" /></div>
} @else {
  <mat-tab-group>
    @for (cat of categories; track cat) {
      <mat-tab [label]="cat">
        <div class="sh-card sh-table-wrap tab-content">
          <table mat-table [dataSource]="getByCategory(cat)">
            <ng-container matColumnDef="key1"><th mat-header-cell *matHeaderCellDef>Clave 1</th><td mat-cell *matCellDef="let row">{{ row.key1 }}</td></ng-container>
            <ng-container matColumnDef="key2"><th mat-header-cell *matHeaderCellDef>Clave 2</th><td mat-cell *matCellDef="let row">{{ row.key2 || '—' }}</td></ng-container>
            <ng-container matColumnDef="name"><th mat-header-cell *matHeaderCellDef>Nombre</th><td mat-cell *matCellDef="let row">{{ row.name }}</td></ng-container>
            <ng-container matColumnDef="description"><th mat-header-cell *matHeaderCellDef>Descripción</th><td mat-cell *matCellDef="let row">{{ row.description }}</td></ng-container>
            <ng-container matColumnDef="active"><th mat-header-cell *matHeaderCellDef>Activo</th><td mat-cell *matCellDef="let row">{{ row.active ? 'Sí' : 'No' }}</td></ng-container>
            <tr mat-header-row *matHeaderRowDef="columns"></tr>
            <tr mat-row *matRowDef="let row; columns: columns"></tr>
          </table>
        </div>
      </mat-tab>
    }
  </mat-tab-group>
}
