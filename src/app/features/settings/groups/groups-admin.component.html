<h3>Grupos de usuarios</h3>
@if (loading) {
  <div class="loading-wrap"><mat-spinner diameter="36" /></div>
} @else {
  <div class="sh-card sh-table-wrap">
    <table mat-table [dataSource]="data">
      <ng-container matColumnDef="name"><th mat-header-cell *matHeaderCellDef>Grupo</th><td mat-cell *matCellDef="let row">{{ row.name }}</td></ng-container>
      <ng-container matColumnDef="description"><th mat-header-cell *matHeaderCellDef>Descripción</th><td mat-cell *matCellDef="let row">{{ row.description }}</td></ng-container>
      <ng-container matColumnDef="members"><th mat-header-cell *matHeaderCellDef>Miembros</th><td mat-cell *matCellDef="let row">{{ row.members }}</td></ng-container>
      <ng-container matColumnDef="modules"><th mat-header-cell *matHeaderCellDef>Módulos</th><td mat-cell *matCellDef="let row">@for (m of row.modules; track m) { <mat-chip>{{ m }}</mat-chip> }</td></ng-container>
      <ng-container matColumnDef="active"><th mat-header-cell *matHeaderCellDef>Activo</th><td mat-cell *matCellDef="let row">{{ row.active ? 'Sí' : 'No' }}</td></ng-container>
      <tr mat-header-row *matHeaderRowDef="columns"></tr>
      <tr mat-row *matRowDef="let row; columns: columns"></tr>
    </table>
  </div>
}
