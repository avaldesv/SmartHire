<h3>Usuarios</h3>
<form [formGroup]="searchForm" class="sh-filters">
  <mat-form-field appearance="outline"><mat-label>Buscar usuario</mat-label><input matInput formControlName="search" /></mat-form-field>
</form>
@if (loading) {
  <div class="loading-wrap"><mat-spinner diameter="36" /></div>
} @else {
  <div class="sh-card sh-table-wrap">
    <table mat-table [dataSource]="data">
      <ng-container matColumnDef="username"><th mat-header-cell *matHeaderCellDef>Usuario</th><td mat-cell *matCellDef="let row">{{ row.username }}</td></ng-container>
      <ng-container matColumnDef="firstName"><th mat-header-cell *matHeaderCellDef>Nombre</th><td mat-cell *matCellDef="let row">{{ row.firstName }}</td></ng-container>
      <ng-container matColumnDef="lastName"><th mat-header-cell *matHeaderCellDef>Apellidos</th><td mat-cell *matCellDef="let row">{{ row.lastName }}</td></ng-container>
      <ng-container matColumnDef="email"><th mat-header-cell *matHeaderCellDef>Correo</th><td mat-cell *matCellDef="let row">{{ row.email }}</td></ng-container>
      <ng-container matColumnDef="profile"><th mat-header-cell *matHeaderCellDef>Perfil</th><td mat-cell *matCellDef="let row">{{ row.profile }}</td></ng-container>
      <ng-container matColumnDef="branch"><th mat-header-cell *matHeaderCellDef>Sucursal</th><td mat-cell *matCellDef="let row">{{ row.branch }}</td></ng-container>
      <ng-container matColumnDef="active"><th mat-header-cell *matHeaderCellDef>Activo</th><td mat-cell *matCellDef="let row">{{ row.active ? 'Sí' : 'No' }}</td></ng-container>
      <tr mat-header-row *matHeaderRowDef="columns"></tr>
      <tr mat-row *matRowDef="let row; columns: columns"></tr>
    </table>
    <mat-paginator [length]="total" [pageSize]="pageSize" [pageIndex]="pageIndex" [pageSizeOptions]="[10, 25, 50]" (page)="onPage($event)" />
  </div>
}
