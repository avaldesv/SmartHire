@if (loading) {
  <div class="loading-wrap"><mat-spinner diameter="36" /></div>
} @else {
  <div class="sh-toolbar-actions">
    <button mat-stroked-button (click)="action('Enviar Smart')"><mat-icon>send</mat-icon> Enviar Smart</button>
    <button mat-stroked-button (click)="action('Agendar entrevista')"><mat-icon>event</mat-icon> Agendar</button>
    <button mat-stroked-button (click)="action('Solicitar documentos')"><mat-icon>description</mat-icon> Documentos</button>
    <button mat-flat-button color="primary" (click)="action('Avanzar etapa')"><mat-icon>arrow_forward</mat-icon> Avanzar ({{ selectedCount }})</button>
  </div>

  <div class="sh-card sh-table-wrap">
    <table mat-table [dataSource]="data">
      <ng-container matColumnDef="select">
        <th mat-header-cell *matHeaderCellDef><mat-checkbox (change)="toggleAll($event.checked)" /></th>
        <td mat-cell *matCellDef="let row"><mat-checkbox [checked]="row.selected" (change)="toggleRow(row)" /></td>
      </ng-container>
      <ng-container matColumnDef="name"><th mat-header-cell *matHeaderCellDef>Candidato</th><td mat-cell *matCellDef="let row">{{ row.firstName }} {{ row.lastName }}</td></ng-container>
      <ng-container matColumnDef="compatibility"><th mat-header-cell *matHeaderCellDef>Compat.</th><td mat-cell *matCellDef="let row">{{ row.compatibility }}%</td></ng-container>
      <ng-container matColumnDef="stage"><th mat-header-cell *matHeaderCellDef>Etapa</th><td mat-cell *matCellDef="let row">{{ row.stage }}</td></ng-container>
      <ng-container matColumnDef="documentsComplete"><th mat-header-cell *matHeaderCellDef>Docs</th><td mat-cell *matCellDef="let row">{{ row.documentsComplete ? 'Completo' : 'Pendiente' }}</td></ng-container>
      <ng-container matColumnDef="interviewScheduled"><th mat-header-cell *matHeaderCellDef>Entrevista</th><td mat-cell *matCellDef="let row">{{ row.interviewScheduled ? 'Sí' : 'No' }}</td></ng-container>
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let row"><button mat-icon-button (click)="action('Ver ' + row.firstName)"><mat-icon>visibility</mat-icon></button></td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="columns"></tr>
      <tr mat-row *matRowDef="let row; columns: columns"></tr>
    </table>
  </div>
}
