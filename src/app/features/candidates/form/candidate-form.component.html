<div class="sh-page">
  <sh-page-header [title]="isEdit ? 'Editar candidato' : 'Nuevo candidato'" subtitle="Complete la información del candidato" />

  @if (loading) {
    <div class="loading-wrap"><mat-spinner diameter="36" /></div>
  } @else {
    <form [formGroup]="form" (ngSubmit)="save()" class="sh-card form-grid">
      <mat-form-field appearance="outline"><mat-label>Nombre</mat-label><input matInput formControlName="firstName" /></mat-form-field>
      <mat-form-field appearance="outline"><mat-label>Apellidos</mat-label><input matInput formControlName="lastName" /></mat-form-field>
      <mat-form-field appearance="outline"><mat-label>Correo</mat-label><input matInput type="email" formControlName="email" /></mat-form-field>
      <mat-form-field appearance="outline"><mat-label>Teléfono</mat-label><input matInput formControlName="phone" /></mat-form-field>
      <mat-form-field appearance="outline"><mat-label>CURP</mat-label><input matInput formControlName="curp" /></mat-form-field>
      <mat-form-field appearance="outline"><mat-label>RFC</mat-label><input matInput formControlName="rfc" /></mat-form-field>
      <mat-form-field appearance="outline"><mat-label>NSS</mat-label><input matInput formControlName="nss" /></mat-form-field>
      <mat-form-field appearance="outline"><mat-label>Género</mat-label><mat-select formControlName="gender"><mat-option value="Femenino">Femenino</mat-option><mat-option value="Masculino">Masculino</mat-option></mat-select></mat-form-field>
      <mat-form-field appearance="outline"><mat-label>País</mat-label><input matInput formControlName="country" /></mat-form-field>
      <mat-form-field appearance="outline"><mat-label>Ciudad</mat-label><input matInput formControlName="city" /></mat-form-field>
      <mat-form-field appearance="outline"><mat-label>Estado</mat-label><input matInput formControlName="state" /></mat-form-field>
      <mat-form-field appearance="outline"><mat-label>Salario deseado</mat-label><input matInput type="number" formControlName="desiredSalary" /></mat-form-field>
      <mat-form-field appearance="outline"><mat-label>Origen</mat-label><mat-select formControlName="source"><mat-option value="Carga Manual">Carga Manual</mat-option><mat-option value="Jobboard">Jobboard</mat-option><mat-option value="BUC">BUC</mat-option></mat-select></mat-form-field>
      <div class="toggle-row"><mat-slide-toggle formControlName="active">Activo</mat-slide-toggle></div>
      <div class="form-actions span-2">
        <button mat-stroked-button type="button" (click)="cancel()">Cancelar</button>
        <button mat-flat-button color="primary" type="submit">Guardar</button>
      </div>
    </form>
  }
</div>
